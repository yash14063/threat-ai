<script type="module">
        const CONFIG = { REQUIRED_DELAY_MS: 10000 }; 
        let currentMode = '', geofence = null, objectModel, poseModel, isContainment = false;
        
        // The new "Lock-On" Timer
        let activeTimer = null; 
        let lastNotificationTime = 0;

        // Voice AI
        const synth = window.speechSynthesis;
        let lastSpeechTime = 0;
        function speakAlert(message) {
            const now = Date.now();
            if (synth && !synth.speaking && (now - lastSpeechTime > 6000)) {
                let cleanMsg = message.replace(/[^a-zA-Z0-9 ]/g, " ");
                const utterance = new SpeechSynthesisUtterance("Alert. " + cleanMsg);
                utterance.rate = 1.1; utterance.pitch = 0.9; synth.speak(utterance); lastSpeechTime = now;
            }
        }

        // Push Notifications
        window.requestNotifications = () => { if ("Notification" in window) Notification.requestPermission(); };
        function sendOSNotification(title, body) { const now = Date.now(); if ("Notification" in window && Notification.permission === "granted" && (now - lastNotificationTime > 15000)) { new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/1157/1157000.png" }); lastNotificationTime = now; } }

        // UI Utils
        window.switchView = (view) => { document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden')); document.getElementById(`view-${view}`).classList.remove('hidden'); };
        window.logEvent = (msg, color="var(--muted)") => { const log = document.getElementById('dash-log'); const entry = document.createElement('div'); entry.style.color = color; entry.innerHTML = `<span style="color:#fff">[${new Date().toLocaleTimeString()}]</span> ${msg}`; log.insertBefore(entry, log.firstChild); };
        window.verifyOTP = () => { loadAIModels(); window.switchView('mode'); };

        window.toggleContainment = () => {
            isContainment = !isContainment; const btn = document.getElementById('btn-containment'), mainWrapper = document.getElementById('dash-wrapper-main');
            if(isContainment) { btn.innerText = "OVERRIDE CONTAINMENT"; btn.style.background = "var(--red)"; btn.style.color = "#fff"; mainWrapper.classList.add('containment-mode'); window.logEvent("CONTAINMENT ENGAGED", "var(--red)"); speakAlert("Critical. Containment Protocol Initiated."); } 
            else { btn.innerText = "INITIATE CONTAINMENT"; btn.style.background = "rgba(239, 68, 68, 0.05)"; btn.style.color = "var(--red)"; mainWrapper.classList.remove('containment-mode'); window.logEvent("Containment Lifted", "var(--green)"); speakAlert("Containment override authorized."); }
        };

        async function startCameras() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 800, height: 600 }});
                document.getElementById('dash-video-main').srcObject = stream; document.getElementById('calib-video').srcObject = stream;
            } catch (err) { alert("Camera not found."); }
        }

        window.selectMode = (mode) => { 
            currentMode = mode; startCameras(); window.requestNotifications(); 
            if(mode === 'HOME') { window.switchView('setup-home'); setupGeofenceLogic(); } 
            else { window.deployDashboard(); } 
        };

        // Geofence Draw
        let isDrawing = false, startX, startY;
        function setupGeofenceLogic() {
            const c = document.getElementById('calib-canvas'); const v = document.getElementById('calib-video');
            v.onloadedmetadata = () => { c.width = v.videoWidth; c.height = v.videoHeight; };
            c.onmousedown = (e) => { isDrawing = true; const r = c.getBoundingClientRect(); let scaleX = c.width / r.width; let scaleY = c.height / r.height; startX = (e.clientX - r.left) * scaleX; startY = (e.clientY - r.top) * scaleY; geofence = {x: startX, y: startY, w: 0, h: 0}; };
            c.onmousemove = (e) => { if(!isDrawing) return; const r = c.getBoundingClientRect(); let currentX = (e.clientX - r.left) * (c.width / r.width), currentY = (e.clientY - r.top) * (c.height / r.height); geofence.w = currentX - startX; geofence.h = currentY - startY; let ctx = c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); let drawX = geofence.w < 0 ? currentX : startX; let drawY = geofence.h < 0 ? currentY : startY; ctx.fillStyle="rgba(6,182,212,0.3)"; ctx.strokeStyle="rgba(6,182,212,0.9)"; ctx.lineWidth=4; ctx.fillRect(drawX, drawY, Math.abs(geofence.w), Math.abs(geofence.h)); ctx.strokeRect(drawX, drawY, Math.abs(geofence.w), Math.abs(geofence.h)); };
            c.onmouseup = () => { isDrawing = false; if(Math.abs(geofence.w)<20) geofence = {x: 100, y: 100, w: 400, h: 300}; };
        }

        window.deployDashboard = () => {
            if(currentMode === 'HOME' && !geofence) geofence = {x: 100, y: 100, w: 400, h: 300}; 
            window.switchView('dashboard');
            const v = document.getElementById('dash-video-main'), c = document.getElementById('dash-canvas');
            const startEngine = () => { c.width = v.videoWidth; c.height = v.videoHeight; runMasterInferenceLoop(); };
            if (v.readyState >= 2) startEngine(); else v.onloadedmetadata = startEngine;
        };

        async function loadAIModels() { await tf.setBackend('webgl'); objectModel = await cocoSsd.load(); poseModel = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING }); }

        const getMirroredX = (x, cW) => cW - x; const getDist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));

        function triggerFinalAlarm(msg, ctx, canvas) {
            document.getElementById('dash-status').innerText = "THREAT CONFIRMED"; 
            document.getElementById('dash-status').style.color = "var(--red)"; 
            document.getElementById('dash-wrapper-main').classList.add('alert-mode');
            ctx.fillStyle = "rgba(239, 68, 68, 0.3)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
            speakAlert(msg);
            sendOSNotification("Critical Threat", msg);
            window.logEvent(`[ALARM] ${msg}`, "var(--red)");
            
            // Auto reset the alarm after 6 seconds so you can do the next demo action
            setTimeout(() => { document.getElementById('dash-wrapper-main').classList.remove('alert-mode'); activeTimer = null; }, 6000);
        }

        async function runMasterInferenceLoop() {
            if(!objectModel || !poseModel) { document.getElementById('dash-status').innerText = "DOWNLOADING AI..."; document.getElementById('dash-status').style.color = "var(--orange)"; requestAnimationFrame(runMasterInferenceLoop); return; }
            if(isContainment) { requestAnimationFrame(runMasterInferenceLoop); return; }
            
            const video = document.getElementById('dash-video-main'), canvas = document.getElementById('dash-canvas'), ctx = canvas.getContext('2d'); 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            
            // ==========================================================
            // THE FAKE-OUT "EASY" TIMER: If a timer is already running, JUST draw the bar!
            // ==========================================================
            if (activeTimer) {
                let elapsed = Date.now() - activeTimer.startTime;
                let progress = Math.min(elapsed / 10000, 1);
                
                document.getElementById('dash-status').innerText = `ANALYZING: ${activeTimer.threatText}`; 
                document.getElementById('dash-status').style.color = "var(--orange)";

                // Draw cinematic Progress Bar
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(canvas.width/2 - 200, 40, 400, 35); 
                ctx.fillStyle = "var(--orange)"; ctx.fillRect(canvas.width/2 - 200, 40, progress * 400, 35); 
                ctx.fillStyle = "#fff"; ctx.font = "18px 'Share Tech Mono'"; ctx.textAlign = "center";
                ctx.fillText(`VERIFYING INTENT: ${Math.floor(elapsed/1000)}s / 10s`, canvas.width/2, 64);

                // When it hits 10 seconds, boom! Alarm.
                if (elapsed >= 10000) {
                    triggerFinalAlarm(activeTimer.threatText, ctx, canvas);
                    activeTimer = { threatText: "ALARM TRIGGERED", startTime: Date.now() + 9999999 }; // Pause it until the 6-second reset happens
                }
                
                requestAnimationFrame(runMasterInferenceLoop);
                return; // SKIP THE AI MATH WHILE THE TIMER IS RUNNING!
            }

            let frameThreat = null; 
            const preds = await objectModel.detect(video);

            // ==========================================================
            // ACTION 1: HOME GEOFENCE
            // ==========================================================
            if (currentMode === 'HOME') {
                let gX = Math.min(geofence.x, geofence.x + geofence.w), gY = Math.min(geofence.y, geofence.y + geofence.h);
                let gW = Math.abs(geofence.w), gH = Math.abs(geofence.h);

                ctx.fillStyle = "rgba(6, 182, 212, 0.15)"; ctx.strokeStyle = "rgba(6, 182, 212, 0.8)"; ctx.lineWidth = 2;
                ctx.fillRect(gX, gY, gW, gH); ctx.strokeRect(gX, gY, gW, gH);
                
                let intruderCount = 0;
                
                preds.forEach(p => {
                    if (p.class === 'person') {
                        let boxX = canvas.width - (p.bbox[0] + p.bbox[2]), boxY = p.bbox[1], boxW = p.bbox[2], boxH = p.bbox[3];
                        let cX = boxX + (boxW / 2), cY = boxY + (boxH / 2);
                        
                        if (cX > gX && cX < gX + gW && cY > gY && cY < gY + gH) { 
                            intruderCount++; 
                            ctx.strokeStyle = '#ef4444'; ctx.lineWidth=4; ctx.strokeRect(boxX, boxY, boxW, boxH); 
                        } else {
                            ctx.strokeStyle = '#10b981'; ctx.lineWidth=2; ctx.strokeRect(boxX, boxY, boxW, boxH);
                        }
                    }
                });
                
                if (intruderCount > 0) frameThreat = { threat: `${intruderCount} HUMAN INTRUDER(S) DETECTED` };
            } 
            
            // ==========================================================
            // ACTIONS 2-5: PUBLIC CROWD (OMNIDIRECTIONAL MATH)
            // ==========================================================
            else if (currentMode === 'PUBLIC') {
                const poses = await poseModel.estimatePoses(video);
                if (poses.length > 0) {
                    poses.forEach(pose => {
                        pose.keypoints.forEach(k => { if(k.score > 0.3) { ctx.fillStyle = 'rgba(6,182,212,0.8)'; ctx.beginPath(); ctx.arc(getMirroredX(k.x, canvas.width), k.y, 4, 0, 2*Math.PI); ctx.fill(); } });
                        
                        const getKP = (name) => pose.keypoints.find(k=>k.name===name);
                        let lW = getKP('left_wrist'), rW = getKP('right_wrist'), nose = getKP('nose');
                        let lS = getKP('left_shoulder'), rS = getKP('right_shoulder'), rE = getKP('right_elbow');
                        
                        // ACTION 2: Distress
                        if(lW && rW && nose && lW.score > 0.3 && rW.score > 0.3 && lW.y < nose.y - 20 && rW.y < nose.y - 20) frameThreat = { threat: "DISTRESS SIGNAL DETECTED" };
                        
                        // ACTION 3: Aggressive Pointing
                        if(rS && rE && rW && rW.score > 0.3 && rW.y < rS.y + 30 && rW.y > rS.y - 30 && getDist(rW, rS) > 90) frameThreat = { threat: "WEAPON POINTING GESTURE DETECTED" };
                    });
                    
                    if (poses.length >= 2 && !frameThreat) {
                        const p1 = poses[0].keypoints; const p2 = poses[1].keypoints;
                        const getSafeKP = (kps, name) => kps.find(k => k.name === name && k.score > 0.3);
                        let p1_rw = getSafeKP(p1, 'right_wrist'), p1_lw = getSafeKP(p1, 'left_wrist'), p1_nose = getSafeKP(p1, 'nose'), p1_hip = getSafeKP(p1, 'left_hip');
                        let p2_rw = getSafeKP(p2, 'right_wrist'), p2_lw = getSafeKP(p2, 'left_wrist'), p2_nose = getSafeKP(p2, 'nose'), p2_hip = getSafeKP(p2, 'left_hip');

                        const checkHit = (wrist, target, distThresh) => {
                            if (!wrist || !target) return false;
                            return getDist({x: getMirroredX(wrist.x, canvas.width), y: wrist.y}, {x: getMirroredX(target.x, canvas.width), y: target.y}) < distThresh;
                        };

                        // ACTION 4: Assault
                        if (checkHit(p1_rw, p2_nose, 55) || checkHit(p1_lw, p2_nose, 55) || checkHit(p2_rw, p1_nose, 55) || checkHit(p2_lw, p1_nose, 55)) frameThreat = { threat: "PHYSICAL ALTERCATION DETECTED" };
                        
                        // ACTION 5: Pickpocket
                        else if (checkHit(p1_rw, p2_hip, 45) || checkHit(p1_lw, p2_hip, 45) || checkHit(p2_rw, p1_hip, 45) || checkHit(p2_lw, p1_hip, 45)) frameThreat = { threat: "PICKPOCKET ATTEMPT DETECTED" };
                    }
                }
            }

            // If a threat is detected for the FIRST TIME, start the automatic 10 second timer!
            if (frameThreat && !activeTimer) {
                activeTimer = { threatText: frameThreat.threat, startTime: Date.now() };
            } else if (!activeTimer) {
                document.getElementById('dash-status').innerText = "SYSTEM SECURE"; 
                document.getElementById('dash-status').style.color = "var(--green)"; 
            }
            
            requestAnimationFrame(runMasterInferenceLoop);
        }
    </script>
